name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test Daml Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM
        run: curl https://get.digitalasset.com/install/install.sh | sh
        shell: bash

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH
        shell: bash

      - name: Build Daml contracts
        # The user's project structure is not specified.
        # If it's a multi-package project, `dpm build --all` might be needed.
        # Assuming single-package for now, `dpm build` is correct.
        run: dpm build
        shell: bash

      - name: Run Daml Script tests
        run: dpm test
        shell: bash